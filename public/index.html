<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockView · 实时股票看板</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#f8fafc;--white:#fff;--border:#e2e8f0;--text:#0f172a;--text2:#475569;--muted:#94a3b8;--accent:#0ea5e9;--accent-bg:#f0f9ff;--up:#16a34a;--up-bg:#f0fdf4;--up-b:#bbf7d0;--down:#dc2626;--down-bg:#fef2f2;--down-b:#fecaca;--shadow:0 1px 4px rgba(0,0,0,0.08);--mono:'DM Mono',monospace;--sans:'Noto Sans SC',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.app{display:grid;grid-template-columns:230px 1fr;grid-template-rows:54px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.main{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.brand-name{font-size:15px;font-weight:700}
.brand-sub{font-size:11px;color:var(--muted)}
.top-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--up-bg);border:1px solid var(--up-b);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--up)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.clock{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text2)}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:8px 8px 4px}
.add-row{display:flex;gap:6px;padding:4px 2px;margin-top:4px}
.add-input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--sans);outline:none}
.add-input:focus{border-color:var(--accent)}
.add-btn{padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
.s-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.s-item:hover{background:var(--bg)}
.s-item.active{background:var(--accent-bg);border-color:#bae6fd}
.si-sym{font-family:var(--mono);font-size:12px;font-weight:600}
.s-item.active .si-sym{color:var(--accent)}
.si-name{font-size:10px;color:var(--muted);margin-top:1px}
.si-price{font-family:var(--mono);font-size:12px;font-weight:600;text-align:right}
.si-chg{font-family:var(--mono);font-size:10px;margin-top:1px;text-align:right}
.si-rm{font-size:15px;color:var(--muted);margin-left:6px;cursor:pointer;opacity:0;transition:opacity 0.15s;line-height:1}
.s-item:hover .si-rm{opacity:1}
.up{color:var(--up)}.dn{color:var(--down)}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.hero-name{font-size:20px;font-weight:700}
.hero-sym{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.hero-price{font-family:var(--mono);font-size:38px;font-weight:600;margin-top:10px;line-height:1}
.hero-chg{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 12px;border-radius:6px;font-family:var(--mono);font-size:13px;font-weight:600}
.hero-chg.up{background:var(--up-bg);color:var(--up);border:1px solid var(--up-b)}
.hero-chg.dn{background:var(--down-bg);color:var(--down);border:1px solid var(--down-b)}
.hero-meta{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.hm-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.hm-val{font-family:var(--mono);font-size:13px;font-weight:600}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 15px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700}
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.range-tabs{display:flex;gap:4px;margin-bottom:12px}
.rtab{padding:4px 10px;border-radius:5px;font-size:11px;font-family:var(--mono);font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--bg);transition:all 0.15s}
.rtab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#candleChart{width:100%!important;height:230px!important}
#volChart{width:100%!important;height:65px!important}
.other-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;background:var(--bg);transition:all 0.15s}
.other-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.news-item{padding:11px 13px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px}
.news-item:last-child{margin-bottom:0}
.news-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;margin-right:6px}
.news-tag.pos{background:var(--up-bg);color:var(--up)}
.news-tag.neg{background:var(--down-bg);color:var(--down)}
.news-tag.neu{background:#f1f5f9;color:var(--muted)}
.news-date{font-size:11px;color:var(--muted);font-family:var(--mono)}
.news-title{font-size:13px;font-weight:500;line-height:1.5;margin-top:5px}
.news-src{font-size:11px;color:var(--muted);margin-top:3px}
.hmap{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.hcell{border-radius:7px;padding:9px 6px;text-align:center;border:1px solid transparent;transition:all 0.5s}
.hcell .hn{font-size:10px;font-weight:700;margin-bottom:2px}
.hcell .hv{font-size:12px;font-family:var(--mono);font-weight:600}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:7px;border:1px solid var(--border);margin-bottom:7px;background:var(--bg)}
.loading{display:flex;align-items:center;justify-content:center;padding:36px;color:var(--muted);font-size:14px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{display:flex;align-items:center;justify-content:center;padding:20px;color:var(--down);font-size:13px;background:var(--down-bg);border-radius:8px}
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:54px auto 1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);padding:8px 10px;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;max-height:none;gap:6px;align-items:center}
  .sec-title{display:none}
  .add-row{min-width:150px;margin-top:0}
  .s-item{min-width:90px;flex-direction:column;align-items:flex-start;gap:1px;padding:7px 8px}
  .si-rm{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .chart-grid{grid-template-columns:1fr}
  .bottom-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="brand">
    <div class="brand-logo">S</div>
    <div><div class="brand-name">StockView</div><div class="brand-sub">真实行情 · 延迟约15分钟</div></div>
  </div>
  <div class="top-right">
    <span style="font-size:11px;color:var(--muted)">Yahoo Finance</span>
    <span class="live-badge"><span class="live-dot"></span>实时</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</header>
<aside class="sidebar">
  <div class="sec-title">自选股票</div>
  <div id="watchlist"></div>
  <div class="add-row">
    <input class="add-input" id="addInput" placeholder="如 NVDA" maxlength="12" onkeydown="if(event.key==='Enter')addStock()">
    <button class="add-btn" onclick="addStock()">+</button>
  </div>
</aside>
<main class="main">
  <div class="card" id="heroCard"><div class="loading"><div class="spinner"></div>正在加载真实数据…</div></div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">今日开盘</div><div class="stat-val" id="s-open">--</div></div>
    <div class="stat-card"><div class="stat-label">今日最高</div><div class="stat-val up" id="s-high">--</div></div>
    <div class="stat-card"><div class="stat-label">今日最低</div><div class="stat-val dn" id="s-low">--</div></div>
    <div class="stat-card"><div class="stat-label">成交量</div><div class="stat-val" id="s-vol">--</div></div>
  </div>
  <div class="chart-grid">
    <div class="card">
      <div class="card-title">K线图（蜡烛图）<span style="font-size:10px;color:var(--muted);font-weight:400;font-family:var(--mono)" id="chartTs"></span></div>
      <div class="range-tabs">
        <div class="rtab active" onclick="setRange(20,this)">1个月</div>
        <div class="rtab" onclick="setRange(45,this)">2个月</div>
        <div class="rtab" onclick="setRange(0,this)">全部</div>
      </div>
      <canvas id="candleChart"></canvas>
      <div style="margin-top:10px"><div class="card-title" style="margin-bottom:8px">成交量</div><canvas id="volChart"></canvas></div>
    </div>
    <div class="card"><div class="card-title">其他自选</div><div id="otherList"></div></div>
  </div>
  <div class="bottom-grid">
    <div class="card"><div class="card-title">最新资讯</div><div id="newsList"></div></div>
    <div class="card">
      <div class="card-title">板块热力图</div>
      <div class="hmap" id="heatmap"></div>
      <div style="margin-top:14px"><div class="card-title" style="margin-bottom:10px">主要汇率</div><div id="fxList"></div></div>
    </div>
  </div>
</main>
</div>
<script>
let watchlist=['000660.KS','005930.KS','NVDA','TSM'];
let active='000660.KS';
let cache={};
let allCandles=[];
let candleRange=20;
let cChart,vChart;
const NAMES={'000660.KS':'SK 海力士','005930.KS':'三星电子','NVDA':'英伟达','TSM':'台积电','AAPL':'苹果','MSFT':'微软','AMZN':'亚马逊','GOOGL':'谷歌','META':'Meta'};
const NEWS={'000660.KS':[{tag:'pos',title:'SK海力士HBM3E出货量环比增长40%，AI服务器需求旺盛',src:'韩国经济日报',date:'2026-03-04'},{tag:'pos',title:'英伟达与SK海力士续签H200供货协议',src:'路透社',date:'2026-03-03'},{tag:'neu',title:'SK海力士Q1净利润预期突破12万亿韩元',src:'彭博社',date:'2026-03-02'},{tag:'neg',title:'美出口管制：SK海力士对华业务占比约8%',src:'FT',date:'2026-03-01'}],'005930.KS':[{tag:'neg',title:'三星存储芯片市占率连续两季下滑',src:'韩国日报',date:'2026-03-04'},{tag:'pos',title:'三星Foundry获高通3nm订单',src:'DigiTimes',date:'2026-03-03'},{tag:'pos',title:'三星宣布回购3万亿韩元股票',src:'韩联社',date:'2026-03-01'}],'NVDA':[{tag:'pos',title:'英伟达Blackwell GPU出货超预期，数据中心营收创新高',src:'CNBC',date:'2026-03-04'},{tag:'pos',title:'微软谷歌加大AI投入，英伟达订单攀升',src:'Bloomberg',date:'2026-03-03'},{tag:'neu',title:'黄仁勋：AI基础设施需求未来5年持续增长',src:'Reuters',date:'2026-03-02'}],'TSM':[{tag:'pos',title:'台积电3nm产能满载，苹果独占份额',src:'DigiTimes',date:'2026-03-04'},{tag:'neu',title:'台积电2nm进入量产准备阶段',src:'科技日报',date:'2026-03-03'},{tag:'neg',title:'地缘政治风险：台积电产能集中度问题',src:'WSJ',date:'2026-03-02'}],'default':[{tag:'neu',title:'全球半导体2026年预计增长18%',src:'IDC',date:'2026-03-04'},{tag:'pos',title:'纳斯达克年初至今上涨12%',src:'Reuters',date:'2026-03-03'},{tag:'neg',title:'美联储维持利率不变',src:'Bloomberg',date:'2026-03-02'}]};
const SECTORS=['半导体','汽车','银行','生技','能源','电信','零售','科技'];
let fxData=[{pair:'USD/KRW',val:1362.5,base:1362.5},{pair:'JPY/KRW',val:9.12,base:9.12},{pair:'EUR/KRW',val:1481.3,base:1481.3},{pair:'CNY/KRW',val:187.4,base:187.4}];
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-CN',{hour12:false});},1000);
async function fetchStock(sym){
  if(cache[sym]&&Date.now()-cache[sym].ts<5*60*1000)return cache[sym].data;
  try{const res=await fetch(`/api/stock?symbol=${sym}`);if(!res.ok)throw new Error();const data=await res.json();if(data.error)throw new Error();cache[sym]={data,ts:Date.now()};return data;}catch(e){return null;}
}
function cur(d){return d&&d.currency==='KRW'?'₩':d&&d.currency==='USD'?'$':'';}
async function renderHero(){
  const card=document.getElementById('heroCard');
  card.innerHTML='<div class="loading"><div class="spinner"></div>加载 '+active+' 真实数据中…</div>';
  const d=await fetchStock(active);
  if(!d){card.innerHTML='<div class="err">⚠️ 数据加载失败，请检查代码（如：000660.KS 或 NVDA）</div>';return;}
  const chg=d.price-d.prevClose,pct=chg/d.prevClose*100,cls=pct>=0?'up':'dn',sign=pct>=0?'+':'',arrow=pct>=0?'▲':'▼',c=cur(d),name=NAMES[active]||d.symbol;
  card.innerHTML=`<div><div class="hero-name">${name}</div><div class="hero-sym">${d.symbol} · ${d.currency} · Yahoo Finance 延迟约15分钟</div><div class="hero-price">${c}${d.price.toLocaleString()}</div><span class="hero-chg ${cls}">${arrow} ${sign}${chg.toLocaleString()} (${sign}${pct.toFixed(2)}%)</span><div class="hero-meta"><div><div class="hm-label">昨收</div><div class="hm-val">${c}${d.prevClose?.toLocaleString()}</div></div><div><div class="hm-label">开盘</div><div class="hm-val">${c}${d.open?.toLocaleString()}</div></div><div><div class="hm-label">最高</div><div class="hm-val" style="color:var(--up)">${c}${d.high?.toLocaleString()}</div></div><div><div class="hm-label">最低</div><div class="hm-val" style="color:var(--down)">${c}${d.low?.toLocaleString()}</div></div><div><div class="hm-label">成交量</div><div class="hm-val">${d.volume}万</div></div></div></div>`;
  document.getElementById('s-open').textContent=`${c}${d.open?.toLocaleString()||'--'}`;
  document.getElementById('s-high').textContent=`${c}${d.high?.toLocaleString()||'--'}`;
  document.getElementById('s-low').textContent=`${c}${d.low?.toLocaleString()||'--'}`;
  document.getElementById('s-vol').textContent=`${d.volume}万股`;
  allCandles=d.candles||[];renderCandles();renderNews();
}
const csPlugin={id:'cs',beforeDatasetsDraw(chart){const{ctx,scales:{x,y}}=chart,data=chart._cd||[];data.forEach((d,i)=>{const xp=x.getPixelForValue(i),oy=y.getPixelForValue(d.o),cy=y.getPixelForValue(d.c),hy=y.getPixelForValue(d.h),ly=y.getPixelForValue(d.l),isUp=d.c>=d.o,color=isUp?'#16a34a':'#dc2626',w=Math.max(3,x.width/data.length*0.55);ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=1.2;ctx.moveTo(xp,hy);ctx.lineTo(xp,ly);ctx.stroke();ctx.fillStyle=color;ctx.fillRect(xp-w/2,Math.min(oy,cy),w,Math.max(2,Math.abs(oy-cy)));});}};
Chart.register(csPlugin);
function renderCandles(){
  const raw=candleRange===0?allCandles:allCandles.slice(-candleRange);
  if(!raw.length)return;if(cChart)cChart.destroy();if(vChart)vChart.destroy();
  const ctx=document.getElementById('candleChart').getContext('2d'),vctx=document.getElementById('volChart').getContext('2d');
  cChart=new Chart(ctx,{type:'line',data:{labels:raw.map(d=>d.t),datasets:[{data:raw.map(d=>d.c),borderColor:'transparent',pointRadius:0,fill:false}]},options:{responsive:true,animation:{duration:300},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`收盘 ${c.parsed.y.toLocaleString()}`}}},scales:{x:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{family:'DM Mono',size:10},maxTicksLimit:8}},y:{position:'right',grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{family:'DM Mono',size:10},callback:v=>v.toLocaleString()}}}},plugins:[csPlugin]});
  cChart._cd=raw;
  vChart=new Chart(vctx,{type:'bar',data:{labels:raw.map(d=>d.t),datasets:[{data:raw.map(d=>d.v),backgroundColor:raw.map(d=>d.c>=d.o?'rgba(22,163,74,0.5)':'rgba(220,38,38,0.5)'),borderRadius:2}]},options:{responsive:true,animation:{duration:300},plugins:{legend:{display:false}},scales:{x:{display:false},y:{position:'right',grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{family:'DM Mono',size:9},maxTicksLimit:3}}}}});
  document.getElementById('chartTs').textContent='● '+new Date().toLocaleTimeString('zh-CN',{hour12:false});
}
function setRange(n,el){candleRange=n;document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderCandles();}
async function renderWatchlist(){
  const el=document.getElementById('watchlist');el.innerHTML='';
  for(const sym of watchlist){const d=await fetchStock(sym);const chg=d?d.price-d.prevClose:0,pct=d?chg/d.prevClose*100:0,cls=pct>=0?'up':'dn',sign=pct>=0?'+':'',arrow=pct>=0?'▲':'▼';const div=document.createElement('div');div.className=`s-item ${sym===active?'active':''}`;div.onclick=()=>selectStock(sym);div.innerHTML=`<div><div class="si-sym">${sym.replace('.KS','')}</div><div class="si-name">${NAMES[sym]||sym}</div></div><div style="display:flex;align-items:center"><div><div class="si-price">${d?d.price.toLocaleString():'--'}</div><div class="si-chg ${cls}">${d?arrow+sign+pct.toFixed(2)+'%':'--'}</div></div><span class="si-rm" onclick="event.stopPropagation();removeStock('${sym}')">×</span></div>`;el.appendChild(div);}
}
async function renderOtherList(){
  const el=document.getElementById('otherList');el.innerHTML='';
  for(const sym of watchlist.filter(s=>s!==active)){const d=await fetchStock(sym);const chg=d?d.price-d.prevClose:0,pct=d?chg/d.prevClose*100:0,cls=pct>=0?'up':'dn',sign=pct>=0?'+':'',arrow=pct>=0?'▲':'▼',c=cur(d);el.innerHTML+=`<div class="other-item" onclick="selectStock('${sym}')"><div><div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)">${sym.replace('.KS','')}</div><div style="font-size:11px;color:var(--muted)">${NAMES[sym]||sym}</div></div><div style="text-align:right"><div style="font-family:var(--mono);font-size:13px;font-weight:600">${d?c+d.price.toLocaleString():'--'}</div><div style="font-family:var(--mono);font-size:11px" class="${cls}">${d?arrow+sign+pct.toFixed(2)+'%':'--'}</div></div></div>`;}
}
async function selectStock(sym){active=sym;renderWatchlist();renderHero();renderOtherList();}
async function addStock(){const val=document.getElementById('addInput').value.trim().toUpperCase();if(!val)return;if(!watchlist.includes(val))watchlist.push(val);if(!NAMES[val])NAMES[val]=val;document.getElementById('addInput').value='';renderWatchlist();renderOtherList();}
function removeStock(sym){if(watchlist.length<=1)return;watchlist=watchlist.filter(s=>s!==sym);if(active===sym)active=watchlist[0];cache={};init();}
function renderNews(){document.getElementById('newsList').innerHTML=(NEWS[active]||NEWS['default']).map(n=>`<div class="news-item"><div><span class="news-tag ${n.tag}">${n.tag==='pos'?'利好':n.tag==='neg'?'利空':'中性'}</span><span class="news-date">${n.date}</span></div><div class="news-title">${n.title}</div><div class="news-src">来源：${n.src}</div></div>`).join('');}
function renderHeatmap(){document.getElementById('heatmap').innerHTML=SECTORS.map(n=>{const c=+(Math.random()*5.6-2.8).toFixed(2),isUp=c>=0,intensity=Math.min(Math.abs(c)/3,1),bg=isUp?`rgba(22,163,74,${0.07+intensity*0.33})`:`rgba(220,38,38,${0.07+intensity*0.33})`,color=isUp?'var(--up)':'var(--down)';return `<div class="hcell" style="background:${bg};border-color:${color}44"><div class="hn" style="color:${color}">${n}</div><div class="hv" style="color:${color}">${c>=0?'+':''}${c}%</div></div>`;}).join('');}
function renderFX(){fxData.forEach(f=>{f.val=+(f.val*(1+(Math.random()-0.5)*0.0008)).toFixed(2);f.chg=f.val-f.base;f.pct=f.chg/f.base*100;});document.getElementById('fxList').innerHTML=fxData.map(f=>{const cls=f.pct>=0?'up':'dn';return `<div class="fx-row"><span style="font-family:var(--mono);font-size:12px;font-weight:600">${f.pair}</span><div style="text-align:right"><div style="font-family:var(--mono);font-size:13px;font-weight:600">${f.val.toFixed(2)}</div><div style="font-family:var(--mono);font-size:10px" class="${cls}">${f.pct>=0?'▲':'▼'} ${f.pct>=0?'+':''}${f.pct.toFixed(3)}%</div></div></div>`;}).join('');}
async function init(){await renderWatchlist();await renderHero();await renderOtherList();renderHeatmap();renderFX();setInterval(renderHeatmap,5000);setInterval(renderFX,3000);setInterval(async()=>{cache={};await renderWatchlist();await renderHero();await renderOtherList();},5*60*1000);}
init();
</script>
</body>
</html>
