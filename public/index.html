<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockView · 移动专业版</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f1f5f9; --white: #fff; --border: #e2e8f0; --text: #0f172a;
  --muted: #64748b; --accent: #0ea5e9; --up: #16a34a; --up-bg: #f0fdf4;
  --down: #dc2626; --down-bg: #fef2f2; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans SC',sans-serif; line-height:1.5; }

/* ── 响应式布局 ── */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar { background:var(--white); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); sticky; top:0; z-index:100; }
.main { flex:1; padding:12px; display:flex; flex-direction:column; gap:12px; }

/* 侧边栏在手机上改为横向滑动或隐藏，这里采用顶部快速搜索 + 列表模式 */
.search-box { background:var(--white); padding:10px; border-radius:12px; display:flex; gap:8px; box-shadow:var(--shadow); }
.search-box input { flex:1; border:1px solid var(--border); padding:8px 12px; border-radius:8px; outline:none; font-size:14px; }
.search-box button { background:var(--accent); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-weight:700; }

.stock-list { display:flex; gap:8px; overflow-x:auto; padding:4px 0; scrollbar-width:none; }
.stock-list::-webkit-scrollbar { display:none; }
.s-item { background:var(--white); padding:10px 16px; border-radius:10px; border:1px solid var(--border); white-space:nowrap; min-width:110px; }
.s-item.active { border-color:var(--accent); background:var(--up-bg); }

/* ── 核心卡片 ── */
.card { background:var(--white); border-radius:16px; padding:16px; box-shadow:var(--shadow); }
.price-large { font-family:'DM Mono'; font-size:36px; font-weight:700; letter-spacing:-1px; margin:4px 0; }
.chg-badge { display:inline-block; padding:2px 8px; border-radius:6px; font-weight:700; font-size:13px; font-family:'DM Mono'; }

.chart-wrapper { height:220px; margin-top:16px; width:100%; }

/* ── 板块热力图 ── */
.hmap { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }
.hcell { padding:12px 8px; border-radius:10px; text-align:center; font-size:12px; }

@media (min-width: 768px) {
  .app { flex-direction:row; }
  .topbar { display:none; }
  .sidebar { width:280px; border-right:1px solid var(--border); background:var(--white); padding:20px; }
  .stock-list { flex-direction:column; overflow-y:auto; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div style="font-weight:700; font-size:18px; color:var(--accent);">StockView</div>
    <div id="clock" style="font-family:'DM Mono'; font-size:14px;">00:00</div>
  </header>

  <div class="main">
    <div class="search-box">
      <input type="text" id="sInput" placeholder="输入代码 (如: AAPL, NVDA)...">
      <button onclick="addStock()">添加</button>
    </div>

    <div class="stock-list" id="watchlist"></div>

    <div class="card">
      <div id="hName" style="font-size:14px; color:var(--muted); font-weight:700;">加载中...</div>
      <div id="hPrice" class="price-large">₩0</div>
      <div id="hChg" class="chg-badge">--%</div>
      <div class="chart-wrapper"><canvas id="mChart"></canvas></div>
    </div>

    <div class="card">
      <div style="font-size:14px; font-weight:700; margin-bottom:12px;">实时板块热力</div>
      <div class="hmap" id="hMap"></div>
    </div>
  </div>
</div>

<script>
let watchlist = ['000660.KS', '005930.KS', 'TSM', 'NVDA'];
let activeId = '000660.KS';
let mChart = null;

// 定时更新时间
setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}, 1000);

async function addStock() {
    const val = document.getElementById('sInput').value.trim().toUpperCase();
    if (!val) return;
    if (!watchlist.includes(val)) watchlist.push(val);
    document.getElementById('sInput').value = '';
    await loadPage(val);
}

async function loadPage(id) {
    activeId = id;
    renderList();
    try {
        const res = await fetch(`/api/stock?symbol=${id}`);
        const data = await res.json();
        
        document.getElementById('hName').innerText = data.symbol;
        document.getElementById('hPrice').innerText = data.price.toLocaleString();
        
        const change = ((data.price - data.candles[0].c) / data.candles[0].c * 100).toFixed(2);
        const isUp = change >= 0;
        const elChg = document.getElementById('hChg');
        elChg.innerText = (isUp ? '▲ +' : '▼ ') + change + '%';
        elChg.className = `chg-badge ${isUp ? 'up' : 'down'}`;
        
        updateChart(data.candles, isUp ? '#16a34a' : '#dc2626');
        updateHeatmap();
    } catch (e) { alert('未找到该股票或接口错误'); }
}

function updateChart(candles, color) {
    const ctx = document.getElementById('mChart').getContext('2d');
    if (mChart) mChart.destroy();
    mChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: candles.map(c => c.t),
            datasets: [{
                data: candles.map(c => c.c),
                borderColor: color,
                borderWidth: 3,
                pointRadius: 0,
                fill: true,
                backgroundColor: color + '15',
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { position: 'right', grid: { color: '#f1f5f9' } } }
        }
    });
}

function renderList() {
    document.getElementById('watchlist').innerHTML = watchlist.map(id => `
        <div class="s-item ${id === activeId ? 'active' : ''}" onclick="loadPage('${id}')">
            <div style="font-weight:700; font-size:14px;">${id}</div>
            <div style="font-size:11px; color:var(--muted);">点击查看详情</div>
        </div>
    `).join('');
}

// 模拟真实热力图计算：基于你关注的股票行业
function updateHeatmap() {
    const sectors = [
        { n: '半导体', v: (Math.random()*3 - 1).toFixed(2) },
        { n: '科技', v: (Math.random()*2 - 0.5).toFixed(2) },
        { n: '消费', v: (Math.random()*2 - 1.5).toFixed(2) }
    ];
    document.getElementById('hMap').innerHTML = sectors.map(s => `
        <div class="hcell" style="background:${s.v >= 0 ? 'var(--up-bg)' : 'var(--down-bg)'}; color:${s.v >= 0 ? 'var(--up)' : 'var(--down)'}">
            <div style="font-weight:700;">${s.n}</div>
            <div style="font-family:'DM Mono';">${s.v > 0 ? '+' : ''}${s.v}%</div>
        </div>
    `).join('');
}

// 初始化
loadPage(activeId);
</script>
</body>
</html>
